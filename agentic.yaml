root_agent: router_agent

models:
  gemini_pro:
    provider: gemini
    config:
      model: gemini-2.5-pro

tools:
  cms_entity_list:
    type: builtin
    description: List CMS entities
    parameters:
      name:
        type: string
        description: Name of the entity schema
        required: true
      limit:
        type: string
        description: Number of records to return
        required: false

  cms_entity_get:
    type: builtin
    description: Get a CMS entity record by ID
    parameters:
      name:
        type: string
        description: Name of the entity schema
        required: true
      id:
        type: string
        description: ID of the record
        required: true

  cms_entity_create:
    type: builtin
    description: Create a CMS entity record
    parameters:
      name:
        type: string
        description: Name of the entity schema
        required: true
      data:
        type: object
        description: Record data
        required: true

  cms_schema_list:
    type: builtin
    description: List all schemas
    parameters: {}

  cms_app_list:
    type: builtin
    description: List all available CMS apps and their descriptions.
    parameters: {}

  cms_app_get:
    type: builtin
    description: Get the detailed definition and context for a specific CMS app, including roles and entity descriptions.
    parameters:
      name:
        type: string
        description: Name of the app
        required: true

  cms_a2ui_update:
    type: builtin
    description: Update a component in the A2UI dashboard
    parameters:
      id:
        type: string
        description: Component ID
        required: true
      type:
        type: string
        description: Component type (e.g., Card, DataTable, Heading)
        required: true
      attributes:
        type: object
        description: Component attributes
        required: false
      children:
        type: array
        description: List of child component IDs
        required: false

agents:
  router_agent:
    type: router
    description: Routes requests between CMS, UI, Matchmaking, and Notification sub-agents
    sub_agents:
      - cms_agent
      - ui_agent
      - matchmaking_agent
      - notification_agent

  notification_agent:
    type: llm
    description: Manages cross-channel notifications (Email, WhatsApp, Signal, Bluesky)
    model: gemini_pro
    instruction: |
      You are the Notification Assistant. Your duties are:
      1. Send notifications to users when a connection_request is received or accepted.
      2. Alert users on their preferred channel (found in user_channel entity) about new StartupChallenges in their sector.
      3. Use the multi_channel app's context to map users to their external identities (WhatsApp, Email, Signal, Bluesky).
    tools:
      - cms_entity_list
      - cms_entity_get

  matchmaking_agent:
    type: llm
    description: Computes aiBizScore and matches startups with investors/mentors
    model: gemini_pro
    instruction: |
      You are the Matchmaking Assistant for the StartUp Ecosystem. Your primary duties are:
      1. Calculate the aiBizScore for startups. Score out of 100 based on completeness of the StartupVenture profile (pitch deck, description, sector, stage) and FounderProfile. Generate constructive details on what is missing.
      2. Match Startups with Mentors: Compare the StartupVenture's 'sector' and 'stage' against the MentorProfile's 'specialization'.
      3. Match Startups with Investors: Compare the StartupVenture's 'sector' and 'stage' against the InvestorProfile's 'preferred_sectors' and 'preferred_stages'.
      Use cms_entity_list to query startups (startup_venture), founders (founder_profile), mentors (mentor_profile), and investors (investor_profile).
      Use cms_entity_create to save aiBizScore calculations to the ai_biz_score entity and propose connections via connection_request.
    tools:
      - cms_entity_list
      - cms_entity_get
      - cms_entity_create

  cms_agent:
    type: llm
    description: Manages CMS data (entities, schemas)
    model: gemini_pro
    instruction: |
      You are the CMS data assistant. You can query, create, update, and list CMS data using the provided tools.
      Always retrieve data when asked by the user.
    tools:
      - cms_entity_list
      - cms_entity_get
      - cms_entity_create
      - cms_schema_list
      - cms_app_list
      - cms_app_get

  ui_agent:
    type: llm
    description: Manages the A2UI dashboard
    model: gemini_pro
    instruction: |
      You are the UI assistant. You can modify the active dashboard components using A2UI.
      When asked to show data on the screen, update the necessary A2UI components using the cms_a2ui_update tool.
    tools:
      - cms_a2ui_update
